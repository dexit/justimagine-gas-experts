name = "just-imagine"
type = "javascript"
main = "dist/server/index.js"
compatibility_date = "2025-01-01"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts", "src/**/*.tsx"]

[build.upload]
format = "service-worker"

[env.production]
name = "just-imagine-production"
account_id = ""
workers_dev = false
route = "justimagine.ltd/*"
zone_id = ""

[env.staging]
name = "just-imagine-staging"
workers_dev = true

# KV Namespace bindings (for sessions, leads, analytics cache, rate limiting)
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

# D1 Database bindings (for CMS data: services, areas, leads, logs)
[[d1_databases]]
binding = "DB"
database_name = "just-imagine-db"
database_id = "YOUR_D1_DATABASE_ID"

# Scheduled triggers for maintenance tasks
[triggers]
crons = [
  "0 */6 * * *",    # Analytics sync every 6 hours
  "0 3 * * *"       # Log cleanup daily at 3 AM UTC
]

# Optional: Durable Objects for state management
# [[durable_objects.bindings]]
# name = "ADMIN_STATE"
# class_name = "AdminState"
# script_name = "just-imagine-admin"

